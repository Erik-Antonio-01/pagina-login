<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Login</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">

</head>

<body>

    <article>
        <div class="pri_text">
            <h2>Login</h2>
        </div>

        <form action="dashboard.html" method="get">

            <div class="log">
                <div class="form_group">
                    <label for="campo_email">Email</label>
                    <input type="email" class="campo" name="email" id="campo_email" required>

                </div>

                <div class="form_group">
                    <label for="campo_senha">Senha</label>
                    <input type="password" class="campo" name="senha" id="campo_senha" required>

                    <a class="link" href="esqueceu.html">Esqueceu a Senha?</a>
                </div>

            </div>

            <div class="form_submit">
                <input type="submit" class="botao" value="Login">

                <p>Não tem cadastro? <a class="link" href="cadastro.html">Criar conta</a></p>
            </div>



        </form>

    </article>




</body>

</html>
